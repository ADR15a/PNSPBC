<section class="contacto-container">
  <div class="contacto-box">
    <h2>Contáctanos</h2>
    <form class="formulario-contacto">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" placeholder="Tu nombre" />

      <label for="correo">Correo:</label>
      <input type="email" id="correo" placeholder="Tu correo electrónico" />

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje..."></textarea>

      <button type="submit" class="btn-gamer">Enviar</button>
      <button routerLink="/" class="btn-gamer">Volver al Inicio</button>

    </form>
  </div>
</section>
